{% extends 'base.html' %}

{% block title %}Вход - ООО НПФ «Роникс-Л»{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm mt-5" style="border: 1px solid rgba(0, 0, 0, 0.08);">
                <div class="card-body p-5" style="background: #ffffff;">
                    <h2 class="text-center mb-4" style="color: #1a1a1a;">
                        <i class="bi bi-box-arrow-in-right"></i> Вход в систему
                    </h2>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_username" class="form-label fw-semibold" style="color: #2c3e50;">Имя пользователя:</label>
                            <input type="text" name="username" class="form-control" id="id_username" required autofocus>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_password" class="form-label fw-semibold" style="color: #2c3e50;">Пароль:</label>
                            <input type="password" name="password" class="form-control" id="id_password" required>
                        </div>
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-lg" style="background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: white; border: none; padding: 0.75rem 1.5rem; font-weight: 500;">
                                <i class="bi bi-box-arrow-in-right"></i> Войти
                            </button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-3">
                        <p class="text-muted">
                            Нет аккаунта? 
                            <a href="{% url 'users:register' %}" class="text-decoration-none" style="color: #2c3e50; font-weight: 500;">Зарегистрироваться</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
