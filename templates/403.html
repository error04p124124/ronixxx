{% extends 'base.html' %}

{% block title %}Доступ запрещён - ООО НПФ «Роникс-Л»{% endblock %}

{% block content %}
<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="error-page">
                <h1 style="font-size: 120px; font-weight: bold; color: var(--text-muted);">403</h1>
                <h2 class="mb-4">Доступ запрещён</h2>
                <p class="text-muted mb-4">
                    У вас недостаточно прав для доступа к этой странице.
                </p>
                <div class="d-flex gap-2 justify-content-center">
                    <a href="{% url 'core:dashboard' %}" class="btn btn-primary">
                        <i class="bi bi-house"></i> На главную
                    </a>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Назад
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .error-page {
        padding: 80px 20px;
    }
</style>
{% endblock %}
